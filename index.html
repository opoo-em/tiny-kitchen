<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#c97d4d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tiny Kitchen" />
    <title>Tiny Kitchen</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <header class="topbar">
      <button id="scratchBtn" class="topbar-btn left" type="button" title="Tell Claude later — scratch note, stays on this phone">✍️</button>
      <h1>Tiny Kitchen</h1>
      <button id="sosBtn" class="topbar-btn right" type="button" title="He won't eat anything — break glass">🧯</button>
      <div class="meal-pills" id="mealPills" role="tablist" aria-label="Meal">
        <button class="meal-pill" data-meal="breakfast" type="button">🍳 Breakfast</button>
        <button class="meal-pill" data-meal="main" type="button">🍽️ Main</button>
        <button class="meal-pill" data-meal="snack" type="button">🍎 Snacks</button>
      </div>
    </header>

    <main>
      <section id="view-browse" class="view" hidden></section>
      <section id="view-deal" class="view" hidden></section>
      <section id="view-recipes" class="view" hidden>
        <div class="controls">
          <input
            id="search"
            type="search"
            placeholder="Search — “chicken” gets ideas first, recipes after…"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
          />
          <label class="toggle">
            <input type="checkbox" id="dairyFreeOnly" checked />
            <span class="toggle-label">Dairy-free only</span>
          </label>
          <div class="tags" id="tagFilter" aria-label="Filter by tag"></div>
        </div>
        <div id="results" class="results"></div>
        <div id="empty" class="empty" hidden>
          <div style="font-size: 2rem; margin-bottom: 0.4rem;">🍳</div>
          Nothing found.<br />
          <small>Try clearing the search or toggling dairy-free off.</small>
        </div>
      </section>
      <section id="view-setup" class="view" hidden></section>
    </main>

    <nav class="tabbar" id="tabbar" aria-label="Tiny Kitchen sections">
      <button class="tab" data-tab="browse" type="button"><span class="tab-icon">🥣</span>Browse</button>
      <button class="tab" data-tab="deal" type="button"><span class="tab-icon">🎲</span>Deal</button>
      <button class="tab" data-tab="recipes" type="button"><span class="tab-icon">📖</span>Recipes</button>
      <button class="tab" data-tab="setup" type="button"><span class="tab-icon">⚙️</span>Setup</button>
    </nav>

    <div id="sosModal" class="sheet-modal" hidden>
      <div class="sheet-backdrop"></div>
      <div class="sheet" role="dialog" aria-label="He won't eat anything">
        <div id="sosContent"></div>
        <button id="sosClose" class="sheet-close" type="button">Okay 💙</button>
      </div>
    </div>

    <div id="scratchModal" class="sheet-modal" hidden>
      <div class="sheet-backdrop"></div>
      <div class="sheet" role="dialog" aria-label="Tell Claude later">
        <h2 class="sos-title">Tell Claude later ✍️</h2>
        <p class="sos-note">Discoveries, likes, rejections, ideas. Lives only on this
        phone — empty it at him next time you talk.</p>
        <textarea id="scratchText" class="scratch-text" rows="8"
          placeholder="e.g. loved the corn fritters, threw the dal (Pepper approved)…"></textarea>
        <div class="sheet-row">
          <button id="scratchClear" class="setup-minor danger" type="button">Clear</button>
          <button id="scratchClose" class="sheet-close" type="button">Done 💙</button>
        </div>
      </div>
    </div>

    <script src="parser.js"></script>
    <script src="app.js"></script>
  </body>
</html>
