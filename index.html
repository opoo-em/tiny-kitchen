<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#c97d4d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tiny Kitchen" />
    <title>Tiny Kitchen</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Tiny Kitchen</h1>
      <p class="subtitle" id="stats"></p>
      <button id="pickForMe" class="pick-btn" type="button" title="Pick something from the current view">
        🎲 Pick for me
      </button>
    </header>

    <main>
      <div class="controls">
        <input
          id="search"
          type="search"
          placeholder="Search ingredients or recipes…"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
        />

        <label class="toggle">
          <input type="checkbox" id="dairyFreeOnly" checked />
          <span class="toggle-label">Dairy-free only</span>
        </label>

        <div class="segmented" id="contentTypeFilter" role="tablist" aria-label="Content type">
          <button class="seg-btn active" data-type="all">All</button>
          <button class="seg-btn" data-type="recipes">Recipes</button>
          <button class="seg-btn" data-type="ideas">💡 Ideas</button>
        </div>

        <div class="tags" id="tagFilter" aria-label="Filter by tag"></div>
      </div>

      <div id="results" class="results"></div>
      <div id="empty" class="empty" hidden>
        <div style="font-size: 2rem; margin-bottom: 0.4rem;">🍳</div>
        Nothing found.<br/>
        <small>Try clearing the search, switching tabs, or toggling dairy-free off.</small>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
