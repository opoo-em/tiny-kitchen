    <path d="M180 130 Q165 95, 195 75 Q225 55, 210 25"/>
    <path d="M256 140 Q241 105, 271 85 Q301 65, 286 35"/>
    <path d="M332 130 Q317 95, 347 75 Q377 55, 362 25"/>
